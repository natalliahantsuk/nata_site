<style>
  /* Instant loading splash — paints before React/Babel finish */
  #boot {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    background: #FFFFFF;
    transition: opacity .6s cubic-bezier(.4,0,.2,1), visibility .6s;
  }
  #boot.boot-done { opacity: 0; visibility: hidden; }
  #boot .boot-mark {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 700;
    font-size: 64px;
    letter-spacing: -3px;
    color: #000000;
    position: relative;
    opacity: 0;
    animation: bootMark .9s cubic-bezier(.2,.8,.2,1) forwards;
  }
  #boot .boot-mark .boot-dot { color: #2756E6; }
  #boot .boot-bar {
    width: 120px;
    height: 2px;
    background: rgba(0,0,0,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  #boot .boot-bar span {
    display: block;
    height: 100%;
    width: 40%;
    background: #000000;
    border-radius: 2px;
    animation: bootBar 1.1s ease-in-out infinite;
  }
  @keyframes bootMark {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bootBar {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(320%); }
  }
  @media (prefers-reduced-motion: reduce) {
    #boot .boot-mark { animation: none; opacity: 1; }
    #boot .boot-bar span { animation: none; width: 100%; }
  }
  /* App always visible — no animation dependency that could trap it hidden */
  #root { opacity: 1; }
</style>
<div id="boot" aria-hidden="true">
  <div class="boot-mark">NH<span class="boot-dot">.</span></div>
  <div class="boot-bar"><span></span></div>
</div>
<div id="root"></div>
